spring.application.name=social
spring.datasource.url=${APP_JDBC_URL:jdbc:postgresql://localhost:5432/social}
spring.datasource.username=${APP_DB_USER:social}
spring.datasource.password=${APP_DB_PASSWORD:social}
spring.flyway.url=${APP_FLYWAY_URL:jdbc:postgresql://localhost:5432/social}
spring.flyway.user=${APP_DB_USER:social}
spring.flyway.password=${APP_DB_PASSWORD:social}
spring.flyway.locations=classpath:db/migration

app.streamer.default-id=streamer-demo
app.streamer.portal-key=${APP_STREAMER_PORTAL_KEY:change-me}
