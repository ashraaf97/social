services:
  postgres:
    image: postgres:16
    container_name: social-postgres
    environment:
      POSTGRES_DB: social
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
    ports:
      - "5432:5432"
    volumes:
      - social_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d social"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  social_postgres_data:
